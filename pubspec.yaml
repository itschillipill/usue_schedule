name: usue_schedule
description: "An app for traking your schedule in USUE"
publish_to: 'none'

version: 4.3.10+91

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  flutter_bloc: ^8.1.6
  dio: ^5.8.0+1
  shared_preferences: ^2.5.3
  share_plus: ^12.0.1
  provider: ^6.1.5+1
  path_provider: ^2.1.5
  equatable: ^2.0.8
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  dart_pubspec_licenses: ^3.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png